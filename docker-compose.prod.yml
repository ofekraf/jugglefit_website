services:
  # Init container to set up database directory permissions
  init-permissions:
    image: busybox
    command: sh -c "mkdir -p /data && chown -R 1001:1001 /data"
    volumes:
      - sqlite_data:/data
    user: root

  web:
    build: .
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=app.py
      - PYTHONUNBUFFERED=1
      - SQLITE_DB_DIR=/app/database_data
      - SQLITE_DB_NAME=jugglefit.db
    env_file:
      - .env
    # 2 workers × 4 threads with --preload: ALL_PROPS_TRICKS is loaded once
    # in the master and shared copy-on-write → fits a 1 GB VM even as the
    # master trick list grows. max-requests recycles workers to cap any
    # slow leaks.
    command: >
      gunicorn --bind 0.0.0.0:5001
      --workers 2 --threads 4 --preload
      --timeout 60 --max-requests 2000 --max-requests-jitter 200
      wsgi:app
    mem_limit: 700m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - sqlite_data:/app/database_data

volumes:
  sqlite_data: