{% extends "macros/base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="route-page">
    <div class="route-header">
        <h1 class="route-title">Login</h1>
    </div>

    <div class="route-form">
        <div class="form-section">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, msg in messages %}
                    <p class="flash flash-{{ category }}">{{ msg }}</p>
                {% endfor %}
            {% endwith %}
            <form method="POST" class="custom-trick-form">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <div class="form-row">
                    <div class="form-group full-width">
                        <label for="display_name">Display name</label>
                        <input type="text" id="display_name" name="display_name"
                               class="form-input" value="{{ display_name }}"
                               autocomplete="username" required autofocus>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group full-width">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password"
                               class="form-input" autocomplete="current-password" required>
                    </div>
                </div>
                <button type="submit" class="primary-button">Login</button>
            </form>
            <p style="margin-top:1rem;">
                No account?
                <a href="{{ url_for('auth.register_view', next=request.args.get('next')) }}">Create one</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
