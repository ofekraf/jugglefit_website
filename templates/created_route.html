{% extends "macros/base.html" %}
{% block title %}Route - JuggleFit{% endblock %}
{% block content %}
<div class="route-page created-route-page">
    <div class="route-header">
        <h1 id="route-title" class="route-title">Route</h1>
    </div>
    
    <div class="route-layout">
        <div id="route-sections" class="route-sections">
            <!-- Route content will be populated by JavaScript -->
        </div>
    </div>
</div>

<div class="route-actions no-print">
    <div class="countdown-timer" id="timer-container">
        <div class="timer-header">
            <span>Timer</span>
            <div class="header-controls">
                <button class="minimize-btn" id="minimizeBtn">−</button>
                <button class="drag-handle">≡</button>
            </div>
        </div>
        <div id="countdown"><span id="timer"></span></div>
        <div class="timer-controls">
            <button id="startBtn" class="timer-btn">Start</button>
            <button id="stopBtn" class="timer-btn" disabled>Stop</button>
            <button id="resetBtn" class="timer-btn">Reset</button>
        </div>
    </div>
    <div class="route-buttons">
        <button class="primary-button" onclick="shareRoute()">Share</button>
        <a id="run-route-link" href="#" class="primary-button">Run Route</a>
        <a id="live-event-link" href="#" class="primary-button live-event-button">Live Event</a>
        <a id="edit-route-link" href="#" class="primary-button">Edit</a>
        <button class="primary-button print-button" onclick="printRoute()">Print with QR</button>
        <button class="primary-button print-button" onclick="printRouteWithoutQR()">Print without QR</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script src="{{ url_for('static', filename='js/general.js') }}?v={{ cache_version }}"></script>
<script src="{{ url_for('static', filename='js/siteswap_x.js') }}?v={{ cache_version }}"></script>

<script type="module">
    // Import route loading functions
    const { loadRoute, initRouteLoading, updateRouteDisplay } = await import("{{ url_for('static', filename='js/route_helpers.js') }}?v={{ cache_version }}");
    
    // Make functions available globally
    window.loadRoute = loadRoute;
    window.initRouteLoading = initRouteLoading;
    window.updateRouteDisplay = updateRouteDisplay;
    
    // Initialize route loading immediately
    initRouteLoading(updateUIWithRoute);
    
    // Update UI elements after route loads
    // Removed all DOMContentLoaded logic to prevent post-load interference
    
    function updateUIWithRoute() {
        if (!window.currentRoute) return;
        
        const titleElement = document.getElementById('route-title');
        if (titleElement) {
            titleElement.textContent = window.currentRoute.name || 'Untitled Route';
        }
        
        // Update timer with correct duration
        originalDuration = window.currentRoute.duration_seconds || 600;
        if (typeof resetTimer === 'function') {
            resetTimer();
        }
        
        // Update action links with current route parameter
        const urlParams = new URLSearchParams(window.location.search);
        const routeParam = urlParams.get('route');
        if (routeParam) {
            const encodedRoute = encodeURIComponent(routeParam);
            const runRouteLink = document.getElementById('run-route-link');
            const liveEventLink = document.getElementById('live-event-link');
            const editRouteLink = document.getElementById('edit-route-link');
            
            if (runRouteLink) {
                const siteswapToggleForRun = document.getElementById('toggle-siteswap-x-checkbox');
                const siteswapXForRun = siteswapToggleForRun && siteswapToggleForRun.checked;
                let runUrl = `/run_route?route=${encodedRoute}`;
                if (siteswapXForRun) {
                    runUrl += '&siteswapx=1';
                }
                runRouteLink.href = runUrl;
            }
            if (liveEventLink) {
                liveEventLink.href = `/live_event?route=${encodedRoute}`;
            }
            if (editRouteLink) {
                const siteswapToggle = document.getElementById('toggle-siteswap-x-checkbox');
                const siteswapXEnabled = siteswapToggle && siteswapToggle.checked;
                let editUrl = `/build_route?route=${encodedRoute}`;
                if (siteswapXEnabled) {
                    editUrl += '&siteswapx=1';
                }
                editRouteLink.href = editUrl;
            }
        }

        // Ensure route display is updated
        if (typeof window.updateRouteDisplay === 'function') {
            window.updateRouteDisplay(null, { editable: false });
        }
    }
</script>

<script>
    // Initialize countdown timer
    let finalTime = null;       // wall-clock deadline (ms) while running
    let timeLeftMs = null;      // remaining ms when paused — used to resume without jumping
    let timerInterval = null;
    let blinkInterval = null;
    let isRunning = false;
    let hasStarted = false;     // true once timer has been started at least once
    let originalDuration = 600; // Default, will be updated when route loads

    // Declare DOM refs at top so all functions can reference them safely
    const timerContainer = document.getElementById('timer-container');
    const minimizeBtn = document.getElementById('minimizeBtn');

    // Web Audio context — created on first user interaction to satisfy browser autoplay policy
    let audioCtx = null;

    function getAudioCtx() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        return audioCtx;
    }

    function playBeep(frequency, duration, volume) {
        try {
            const ctx = getAudioCtx();
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, ctx.currentTime);
            gainNode.gain.setValueAtTime(volume, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
            oscillator.start(ctx.currentTime);
            oscillator.stop(ctx.currentTime + duration);
        } catch (e) {
            // Audio not supported — silently ignore
        }
    }

    function playFinishSound() {
        // Three rising beeps — classic "times up" signal
        playBeep(523, 0.2, 0.6); // C5
        setTimeout(() => playBeep(659, 0.2, 0.6), 220); // E5
        setTimeout(() => playBeep(784, 0.5, 0.8), 440); // G5
    }

    function timerFinished() {
        timerContainer.classList.add('finished');
        document.getElementById('countdown').textContent = "Time's up!";
        document.getElementById('startBtn').disabled = true;
        playFinishSound();
    }

    function stopBlink() {
        timerContainer.classList.remove('finished');
    }

    // Share Route functionality
    async function shareRoute() {
        const shareBtn = document.querySelector('button[onclick="shareRoute()"]');
        const originalText = shareBtn.textContent;
        shareBtn.textContent = 'Shortening...';
        shareBtn.disabled = true;

        const longUrl = window.location.href;
        
        try {
            // Request a short URL from the API
            const response = await fetch('/api/shorten_url', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ long_url: longUrl })
            });
            const data = await response.json();
            const shortUrl = data.short_url;
            const urlToShare = shortUrl || longUrl;
            
            await navigator.clipboard.writeText(urlToShare);
            if (shortUrl) {
                showToast('URL copied to clipboard!');
            } else {
                showToast('Long URL copied (Shortener unavailable)');
            }
        } catch (err) {
            console.error('Failed to copy URL: ', err);
            // Fallback to long URL if anything goes wrong
            try {
                await navigator.clipboard.writeText(longUrl);
                showToast('Long URL copied (Shortener failed)');
            } catch (clipboardErr) {
                showToast('Failed to copy URL. Please try again.');
            }
        } finally {
            shareBtn.textContent = originalText;
            shareBtn.disabled = false;
        }
    }

    // Toast notification function
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.textContent = message;
        document.body.appendChild(toast);
        
        // Show the toast
        setTimeout(() => {
            toast.classList.add('show');
        }, 100);
        
        // Hide and remove the toast after 3 seconds
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => {
                toast.remove();
            }, 300);
        }, 3000);
    }

    function formatTime(ms) {
        const totalSecs = Math.max(0, Math.floor(ms / 1000));
        const minutes = Math.floor(totalSecs / 60);
        const seconds = totalSecs % 60;
        return minutes.toString().padStart(2, '0') + ':' + seconds.toString().padStart(2, '0');
    }

    function updateStartBtn() {
        const btn = document.getElementById('startBtn');
        btn.textContent = hasStarted ? 'Continue' : 'Start';
    }

    function updateTimer() {
        if (!finalTime) return;

        const remaining = finalTime - new Date().getTime();

        if (remaining <= 0) {
            stopTimer();
            timerFinished();
            return;
        }

        document.getElementById('timer').textContent = formatTime(remaining);
    }

    function startTimer() {
        if (isRunning) return;
        isRunning = true;
        hasStarted = true;
        stopBlink(); // Clear finished state if restarting after time's up

        // Resume from where we paused; first start uses full duration
        const resumeMs = (timeLeftMs !== null) ? timeLeftMs : (originalDuration * 1000);
        finalTime = new Date().getTime() + resumeMs;
        timeLeftMs = null; // clear — will be captured on next stop

        timerInterval = setInterval(updateTimer, 100);
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        updateTimer();
    }

    function stopTimer() {
        if (!isRunning) return;
        isRunning = false;
        clearInterval(timerInterval);

        // Capture exactly how much time is left so resume is seamless
        timeLeftMs = Math.max(0, finalTime - new Date().getTime());
        finalTime = null;

        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        updateStartBtn();
    }

    function resetTimer() {
        stopTimer();
        stopBlink();
        finalTime = null;
        timeLeftMs = null;
        hasStarted = false;
        document.getElementById('countdown').innerHTML = 'Time remaining: <span id="timer"></span>';
        document.getElementById('timer').textContent = formatTime(originalDuration * 1000);
        updateStartBtn();
    }

    // Add event listeners for buttons
    // Prime AudioContext on first user interaction (browser autoplay policy)
    document.getElementById('startBtn').addEventListener('click', () => { getAudioCtx(); startTimer(); });
    document.getElementById('stopBtn').addEventListener('click', stopTimer);
    document.getElementById('resetBtn').addEventListener('click', resetTimer);

    // Initialize timer display immediately
    resetTimer();

    // Minimize functionality
    function setMinimized(minimized) {
        if (minimized) {
            timerContainer.classList.add('minimized');
            minimizeBtn.textContent = '+';
        } else {
            timerContainer.classList.remove('minimized');
            minimizeBtn.textContent = '−';
        }
    }

    // Auto-minimize on mobile
    setMinimized(window.innerWidth <= 768);

    minimizeBtn.addEventListener('click', function(e) {
        e.stopPropagation(); // Prevent drag start
        setMinimized(!timerContainer.classList.contains('minimized'));
    });

    // Timer drag functionality
    const timer = document.querySelector('.countdown-timer');
    const timerHeader = timer.querySelector('.timer-header');
    let isDragging = false;
    let currentX;
    let currentY;
    let initialX;
    let initialY;
    let xOffset = 0;
    let yOffset = 0;

    function dragStart(e) {
        if (e.type === "touchstart") {
            initialX = e.touches[0].clientX - xOffset;
            initialY = e.touches[0].clientY - yOffset;
        } else {
            initialX = e.clientX - xOffset;
            initialY = e.clientY - yOffset;
        }

        if ((e.target === timer || e.target === timerHeader || e.target.closest('.timer-header')) && !e.target.closest('.minimize-btn')) {
            isDragging = true;
        }
    }

    function dragEnd(e) {
        initialX = currentX;
        initialY = currentY;
        isDragging = false;
    }

    function drag(e) {
        if (isDragging) {
            e.preventDefault();

            if (e.type === "touchmove") {
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
            } else {
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
            }

            xOffset = currentX;
            yOffset = currentY;

            setTranslate(currentX, currentY, timer);
        }
    }

    function setTranslate(xPos, yPos, el) {
        el.style.transform = `translate(${xPos}px, ${yPos}px)`;
    }

    timerHeader.addEventListener("touchstart", dragStart, false);
    timerHeader.addEventListener("touchend", dragEnd, false);
    timerHeader.addEventListener("touchmove", drag, false);

    timerHeader.addEventListener("mousedown", dragStart, false);
    timerHeader.addEventListener("mouseup", dragEnd, false);
    timerHeader.addEventListener("mousemove", drag, false);

    // Print Route functionality
    async function printRoute() {
        // Remove any existing QR code containers and their contents
        const existingQRCodes = document.querySelectorAll('.qr-code');
        existingQRCodes.forEach(qr => {
            qr.innerHTML = '';
            qr.remove();
        });

        // Create a temporary container for the QR code
        let qrContainer = document.createElement('div');
        qrContainer.className = 'qr-code print-only';
        
        // Append to the route sections container
        const routeSections = document.querySelector('.route-sections');
        if (routeSections) {
            routeSections.appendChild(qrContainer);
        } else {
            // Fallback to route-page if route-sections not found
            const routePage = document.querySelector('.route-page');
            if (routePage) {
                routePage.appendChild(qrContainer);
            } else {
                document.body.appendChild(qrContainer);
            }
        }

        // Get the current long URL
        const longUrl = window.location.href;

        try {
            // Request a short URL from the API
            const response = await fetch('/api/shorten_url', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ long_url: longUrl })
            });
            const data = await response.json();
            const shortUrl = data.short_url;

            // Generate QR code for the short URL
            new QRCode(qrContainer, {
                text: shortUrl,
                width: 280,
                height: 280,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            if (!data.short_url) {
                showToast('Heavy QR generated due to server error');
            }
        } catch (error) {
            // Fallback: generate QR for the long URL if API fails
            new QRCode(qrContainer, {
                text: longUrl,
                width: 280,
                height: 280,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            showToast('Heavy QR generated due to server error');
        }

        // Add event listener for afterprint
        const cleanup = () => {
            qrContainer.innerHTML = '';
            qrContainer.remove();
            window.removeEventListener('afterprint', cleanup);
        };
        window.addEventListener('afterprint', cleanup);

        // Wait for QR code to be generated before printing
        setTimeout(() => {
            try {
                window.print();
            } catch (e) {
                console.error("Printing failed:", e);
                showToast("Printing failed. Please try again.");
            }
        }, 1000);
    }

    function printRouteWithoutQR() {
        // Remove any existing QR code
        const existingQRCodes = document.querySelectorAll('.qr-code');
        existingQRCodes.forEach(qr => {
            qr.innerHTML = '';
            qr.remove();
        });

        // Add event listener for afterprint
        const cleanup = () => {
            window.removeEventListener('afterprint', cleanup);
        };
        window.addEventListener('afterprint', cleanup);

        // Wait a moment for cleanup, then print
        setTimeout(() => {
            window.print();
        }, 100);
    }
</script>
{% endblock %}
